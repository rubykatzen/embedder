name: Update embedded fragments
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/install-embedder
      - name: Run embedder update
        env:
          GH_TOKEN: ${{ github.token }}
        run: embedder update .
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: ./.github/actions/open-fragments-pr
