name: Update embedded fragments
on:
  schedule:
    - cron: '0 8 * * *'  # 10:00 Berlin (CEST, UTC+2)
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Run embedder update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pip install -e .
          embedder update . --json > /tmp/embedder-result.json
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: ./.github/actions/open-fragments-pr
