name: Publish release
on:
  pull_request:
    types: [closed]
    branches: [main]
jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - uses: rubykatzen/releaser/.github/actions/read-release-data@v0.3.4
        id: meta
        with:
          branch: ${{ github.event.pull_request.head.ref }}
      - uses: rubykatzen/releaser/.github/actions/create-release@v0.3.4
        with:
          version: ${{ steps.meta.outputs.version }}
          notes: ${{ steps.meta.outputs.notes }}
      - uses: ./.github/actions/upload-fragments
        with:
          release-tag: v${{ steps.meta.outputs.version }}
  update-tap:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh workflow run update-formulas.yml --repo rubykatzen/homebrew-tap
          gh workflow run update-fragments.yml --repo rubykatzen/homebrew-tap
