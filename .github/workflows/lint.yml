name: Lint
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rubykatzen/baseline/.github/actions/lint-yamllint@v0.5.2
      - uses: rubykatzen/baseline/.github/actions/lint-ruff@v0.5.2
      - uses: rubykatzen/baseline/.github/actions/lint-actionlint@v0.5.2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e . pytest
      - run: pytest
