name: Spec
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
jobs:
  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e . pytest
      - run: pytest
