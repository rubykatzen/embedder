name: Update embedded fragments
on:
  workflow_call:
    inputs:
      paths:
        description: Files or directories to scan. Defaults to the current directory.
        required: false
        type: string
        default: "."
    secrets:
      token:
        description: GitHub token for accessing private fragment source repositories.
        required: false
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: rubykatzen/embedder/.github/actions/install-embedder@v0.2
      - name: Run embedder update
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: embedder update "${{ inputs.paths }}"
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: rubykatzen/embedder/.github/actions/open-fragments-pr@v0.2
