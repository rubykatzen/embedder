name: Refresh local fragments
description: Re-embed all local fragment refs in the workspace without bumping external dependencies.
inputs:
  paths:
    description: Files or directories to scan. Defaults to the current directory.
    required: false
    default: "."
runs:
  using: composite
  steps:
    - name: Refresh local fragments
      shell: bash
      run: embedder update ${{ inputs.paths }} --local-only
    - name: Commit local fragment updates
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git diff --cached --quiet || git commit -m "chore: refresh local fragments"
