name: Bump shared workflow embedder version
description: Bump the embedder pip install version in update-fragments-shared.yml, commit and push.
inputs:
  version:
    description: Release version without v prefix.
    required: true
runs:
  using: composite
  steps:
    - name: Bump and commit
      shell: bash
      run: |
        set -euo pipefail
        file=.github/workflows/update-fragments-shared.yml
        if ! grep -q 'install-embedder@v' "$file" 2>/dev/null; then
          exit 0
        fi
        sed -i "s|/install-embedder@v[^'\"]*|/install-embedder@v${{ inputs.version }}|" "$file"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "$file"
        git diff --cached --quiet || git commit -m "chore: bump shared workflow to ${{ inputs.version }}"
